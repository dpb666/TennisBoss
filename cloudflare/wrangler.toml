name = "tennisboss-api"
main = "worker.js"
compatibility_date = "2024-09-23"
account_id = "cdbd81bae4e8a81f7c9d9022fb5470c5"

# URL permanente : https://tennisboss-api.<ton-subdomain>.workers.dev
workers_dev = true

[vars]
# Domaine permanent (tennisboss.online, Cloudflare DNS) → tunnel nommé cloudflared
# "tennisboss" → localhost:8000. Ne dépend plus d'un tunnel rapide éphémère.
TUNNEL_URL = "https://api.tennisboss.online"
# API_TOKEN n'est plus stocké ici (secret exposé en clair dans git) — voir `wrangler secret put API_TOKEN`.
