<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TennisBoss | Real-time ROI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .status {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.9em;
        }
        .status.connected {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid #4caf50;
        }
        .status.disconnected {
            background: rgba(244, 67, 54, 0.3);
            border: 1px solid #f44336;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stats-box, .settlement-feed {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat {
            margin-bottom: 15px;
        }
        .stat-label {
            font-size: 0.85em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #1e3c72;
            margin-top: 5px;
        }
        .stat-value.profit {
            color: #4caf50;
        }
        .stat-value.loss {
            color: #f44336;
        }

        .settlement-feed {
            background: rgba(255, 255, 255, 0.95);
        }
        .feed-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 15px;
            border-bottom: 2px solid #2a5298;
            padding-bottom: 10px;
        }
        .settlement-item {
            border-left: 4px solid #2a5298;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(42, 82, 152, 0.05);
            border-radius: 4px;
            font-size: 0.95em;
        }
        .settlement-item.win {
            border-left-color: #4caf50;
            background: rgba(76, 175, 80, 0.05);
        }
        .settlement-item.loss {
            border-left-color: #f44336;
            background: rgba(244, 67, 54, 0.05);
        }
        .settlement-item.neutral {
            border-left-color: #ff9800;
        }

        .match-header {
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 5px;
        }
        .match-detail {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #666;
            margin-top: 3px;
        }
        .roi-badge {
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            background: #2a5298;
            color: white;
            font-size: 0.85em;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎾 TennisBoss ROI</h1>
            <div id="status" class="status disconnected">
                <span id="status-text">Connecting...</span>
            </div>
        </div>

        <div class="dashboard">
            <div class="stats-box">
                <div class="stat">
                    <div class="stat-label">Total ROI</div>
                    <div id="total-roi" class="stat-value">—</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Matches Settled</div>
                    <div id="match-count" class="stat-value">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Accuracy</div>
                    <div id="accuracy" class="stat-value">—</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Last Update</div>
                    <div id="last-update" class="stat-value" style="font-size: 1em;">—</div>
                </div>
            </div>

            <div class="settlement-feed">
                <div class="feed-title">Live Settlement Feed</div>
                <div id="feed" class="loading">Waiting for settlements...</div>
            </div>
        </div>
    </div>

    <script>
        let matchCount = 0;
        let totalROI = 0;
        let settlements = [];
        let wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        let wsUrl = `${wsProtocol}//${window.location.host}/api/v2/ws/settlement`;
        let ws = null;

        function updateStatus(connected) {
            const statusEl = document.getElementById('status');
            const statusText = document.getElementById('status-text');
            if (connected) {
                statusEl.className = 'status connected';
                statusText.textContent = '● Connected (live)';
            } else {
                statusEl.className = 'status disconnected';
                statusText.textContent = '● Disconnected';
            }
        }

        function connectWebSocket() {
            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    console.log('WebSocket connected');
                    updateStatus(true);
                };

                ws.onmessage = (event) => {
                    try {
                        const payload = JSON.parse(event.data);
                        if (payload.type === 'settled') {
                            onSettled(payload.data);
                        }
                    } catch (e) {
                        console.error('Failed to parse message:', e);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateStatus(false);
                };

                ws.onclose = () => {
                    console.log('WebSocket disconnected');
                    updateStatus(false);
                    // Auto-reconnect after 3 seconds
                    setTimeout(connectWebSocket, 3000);
                };
            } catch (e) {
                console.error('Failed to create WebSocket:', e);
                updateStatus(false);
                setTimeout(connectWebSocket, 5000);
            }
        }

        function onSettled(data) {
            matchCount++;
            totalROI += data.roi_delta || 0;

            // Prepend to settlements list
            settlements.unshift(data);
            if (settlements.length > 20) settlements.pop();

            updateFeed();
            updateStats();
        }

        function updateFeed() {
            const feedEl = document.getElementById('feed');
            if (settlements.length === 0) {
                feedEl.innerHTML = '<div class="loading">No settlements yet...</div>';
                return;
            }

            feedEl.innerHTML = settlements.map((s, i) => {
                let className = 'settlement-item neutral';
                if (s.correct === 1 && s.roi_delta > 0) {
                    className = 'settlement-item win';
                } else if (s.correct === 0) {
                    className = 'settlement-item loss';
                }

                const roiBadge = s.roi_delta !== undefined
                    ? `<span class="roi-badge" style="background: ${s.roi_delta > 0 ? '#4caf50' : '#f44336'}">${s.roi_delta > 0 ? '+' : ''}${s.roi_delta.toFixed(2)}</span>`
                    : '';

                return `
                    <div class="${className}">
                        <div class="match-header">${s.player1} vs ${s.player2}</div>
                        <div class="match-detail">
                            <span>🎯 Pred: <strong>${s.pred_favorite || '?'}</strong> (${s.pred_prob1 || '?'}%)</span>
                            <span>✓ Winner: <strong>${s.winner}</strong></span>
                            ${roiBadge}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            document.getElementById('match-count').textContent = matchCount;
            const roiEl = document.getElementById('total-roi');
            roiEl.textContent = totalROI.toFixed(3);
            roiEl.className = 'stat-value ' + (totalROI > 0 ? 'profit' : (totalROI < 0 ? 'loss' : ''));

            const wins = settlements.filter(s => s.correct === 1).length;
            const accuracy = matchCount > 0 ? ((wins / matchCount) * 100).toFixed(1) : '—';
            document.getElementById('accuracy').textContent = accuracy + '%';

            const now = new Date();
            document.getElementById('last-update').textContent = now.toLocaleTimeString();
        }

        // Connect on load
        connectWebSocket();

        // Periodically fetch calibration metrics (fallback poll)
        async function fetchMetrics() {
            try {
                const res = await fetch('/api/v2/settlement-status');
                if (!res.ok) return;
                // Could update from this endpoint if needed
            } catch (e) {
                console.warn('Failed to fetch metrics:', e);
            }
        }
        setInterval(fetchMetrics, 30000);
    </script>
</body>
</html>
