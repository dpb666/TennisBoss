version: '3.8'

services:
  tennisboss:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./state:/app/state
      - ./logs:/app/logs
    environment:
      - TENNISBOSS_LOG_LEVEL=INFO
      - ODDS_API_KEY=${ODDS_API_KEY:-}
      - AT_API_KEY=${AT_API_KEY:-}
      - LM_STUDIO_URL=http://localhost:1234/v1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: LM Studio for local LLM (chat endpoint)
  # lm-studio:
